<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/main.css">
    <title>Form Pendaftaran Mahasiswa Baru</title>
</head>
<body>
    <div id="header"><h1>WELCOME TO MY WEBSITE </h1></div>
    <div id="link">
        <ul><li><a href="#">London</a></li><li><a href="#">Paris</a></li><li><a href="#">Tokyo</a></li></ul>
    </div>
    
    <div id="content">
        <fieldset>
            <legend>Form Pendaftaran Mahasiswa Baru</legend>
            <form action="proses.php" method="POST">
                <table>
                    <tr>
                        <td><label>Nama Lengkap</label></td>
                        <td>: <input type="text" name="nama_lengkap" size="30"></td>
                    </tr>
                    <tr>
                        <td><label>Tempat, Tanggal Lahir</label></td>
                        <td>: <input type="text" name="tempat_lahir" size="15"> 
                            <select name="tgl_lahir">
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                </select> - 
                            <select name="bln_lahir">
                                <option value="Januari">Januari</option><option value="Februari">Februari</option>
                                </select> - 
                            <select name="thn_lahir">
                                <option value="1989">1989</option><option value="1990">1990</option><option value="1991">1991</option>
                                <option value="1992">1992</option><option value="1993">1993</option><option value="1994">1994</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label>Agama</label></td>
                        <td>: 
                            <select name="agama">
                                <option value="Islam">Islam</option><option value="Kristen">Kristen</option>
                                <option value="Katolik">Katolik</option><option value="Hindu">Hindu</option>
                                <option value="Budha">Budha</option><option value="Konghucu">Konghucu</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label>Jenis Kelamin</label></td>
                        <td>: <input type="radio" name="jk" value="Laki-laki"> Laki-laki <input type="radio" name="jk" value="Perempuan"> Perempuan</td>
                    </tr>
                    <tr>
                        <td><label>No. Ijazah SMU/MA/SMK</label></td>
                        <td>: <input type="text" name="no_ijazah" size="30"></td>
                    </tr>
                    <tr>
                        <td><label>Foto (Ukuran File Maks. 27 KB)</label></td>
                        <td>: <input type="file" name="foto_profil"></td>
                    </tr>
                    <tr>
                        <td><label>Nama Ayah</label></td>
                        <td>: <input type="text" name="nama_ayah" size="30"></td>
                    </tr>
                    <tr>
                        <td><label>Nama Ibu</label></td>
                        <td>: <input type="text" name="nama_ibu" size="30"></td>
                    </tr>
                    <tr>
                        <td><label>Alamat Orangtua</label></td>
                        <td>: <textarea name="alamat_ortu" rows="4" cols="30"></textarea></td>
                    </tr>
                    <tr>
                        <td><label>No Telp</label></td>
                        <td>: <input type="text" name="no_telp" size="15"></td>
                    </tr>
                    <tr>
                        <td><label>Nama Sekolah Asal</label></td>
                        <td>: <input type="text" name="asal_sekolah" size="30"></td>
                    </tr>
                    <tr>
                        <td><label>Alamat Sekolah Asal</label></td>
                        <td>: <textarea name="alamat_sekolah" rows="4" cols="30"></textarea></td>
                    </tr>
                    <tr>
                        <td><label>Jurusan Dipilih</label></td>
                        <td>: 
                            <select name="jurusan">
                                <option value="Komputerisasi Akuntansi">Komputerisasi Akuntansi</option>
                                <option value="Administrasi Bisnis">Administrasi Bisnis</option>
                                <option value="Teknik Komputer Kontrol">Teknik Komputer Kontrol</option>
                                <option value="Teknik Listrik">Teknik Listrik</option>
                                <option value="Mesin Otomotif">Mesin Otomotif</option>
                                <option value="Perkeretaapian">Perkeretaapian</option>
                                <option value="Teknologi Informasi">Teknologi Informasi</option>
                                <option value="Akuntansi">Akuntansi</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label>Tahu informasi dari</label></td>
                        <td>: 
                            <input type="checkbox" name="info" value="Koran"> Koran
                            <input type="checkbox" name="info" value="Website"> Website
                            <input type="checkbox" name="info" value="Televisi"> Televisi
                            <input type="checkbox" name="info" value="Radio"> Radio
                            <input type="checkbox" name="info" value="Teman"> Teman
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="submit" value="DAFTAR"> 
                            <input type="reset" value="BATAL">
                        </td>
                    </tr>
                </table>
            </form>
        </fieldset>
    </div>
    
    <div id="footer"><i>copyright@Abelgis_253307002_2023</i></div>
</body>
</html>
