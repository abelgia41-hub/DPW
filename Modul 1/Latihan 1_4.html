<!DOCTYPE html>
<html>
<head>
    <title>Halaman HTML saya - Latihan 4</title>
</head>
<body>
    <h1>Latihan Untuk Membuat List</h1>

    <ol type="1">
        <li>Jenis Buah:</li>
        <li>Jenis Makanan:</li>
        <li>Gender:</li>
    </ol>

    <ul>
        <li>Apel</li>
        <li>Nanas</li>
        <li>Jeruk</li>
        <li>Anggur</li>
    </ul>

    <hr>

    <ol type="A">
        <li>Jenis Buah:
            <ul>
                <li>Durian</li>
                <li>Mangga</li>
            </ul>
        </li>
        <li>Jenis Makanan:
            <ol type="1">
                <li>Nasi Geprek</li>
                <li>Nasi Goyeng</li>
                <li>Sate Ayam</li>
            </ol>
        </li>
        <li>Gender:
            <ol type="a">
                <li>MAN</li>
                <li>WOMEN</li>
            </ol>
        </li>
    </ol>
</body>
</html>
