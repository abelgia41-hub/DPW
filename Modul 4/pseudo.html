<!DOCTYPE html>
<html>
<head>
<style>
  p {
    display: none;
    background-color: darkgray;
    padding: 20px;
  }
  div:hover p { 
    display: block;
  }
 
  a:hover {
    color: red;
  }
</style>
</head>
<body>
  <div> Letakkan kursor disini untuk melihat div element
    <p>Saya adalah element p</p>
  </div>
  <br>
  <a href="#">Ini adalah contoh link dengan pseudo-class hover</a>
</body>
</html>
