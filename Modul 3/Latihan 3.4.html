<article>
    <h1>Audio Player</h1>
    <audio controls autoplay>
        <source src="wiwi lagu.mp3" type="audio/mpeg">
        Browser tidak mendukung pemutar audio.
    </audio><br><br>
    
    <audio controls muted>
        <source src="wiwi lagu.mp3" type="audio/mpeg">
        Browser tidak mendukung pemutar audio.
    </audio>

    <p><strong>Kesimpulan:</strong> Atribut <code>autoplay</code> membuat audio langsung berputar saat halaman dimuat, sedangkan <code>muted</code> membuat file audio tersebut dalam keadaan bisu (volume 0) secara *default* hingga pengguna mengubahnya.</p>
</article>
