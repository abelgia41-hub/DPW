<article style="height: auto;">
    <h1>Gambar Pemandangan dengan Mouse Event</h1>
    <img src="cuku.jpg" alt="Sesuatu 1" style="width:30%; margin: 1%; transition: 0.3s;" onmouseover="this.style.opacity='0.5'" onmouseout="this.style.opacity='1'">
    <img src="lien.jpg" alt="Sesuatu 2" style="width:30%; margin: 1%; transition: 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
    <img src="muwee.jpg" alt="Sesuatu 3" style="width:30%; margin: 1%; transition: 0.3s;" onmouseover="this.style.filter='grayscale(100%)'" onmouseout="this.style.filter='grayscale(0%)'">
</article>
