<article style="height: auto;">
    <h2>Form Penjadwal Pertemuan</h2>
    <form action="#" method="POST">
        <fieldset style="margin-bottom: 20px;">
            <legend>Informasi Pribadi</legend>
            <table style="width: 100%;">
                <tr>
                    <td style="width: 30%;"><label for="nama">Nama</label></td>
                    <td><input type="text" id="nama" name="nama" required></td>
                </tr>
                <tr>
                    <td><label for="telepon">No. Telepon</label></td>
                    <td><input type="tel" id="telepon" name="telepon" pattern="[0-9]{4}-[0-9]{6}" title="Format: XXXX-XXXXXX" required></td>
                </tr>
                <tr>
                    <td><label for="email">Alamat Email</label></td>
                    <td><input type="email" id="email" name="email" placeholder="nama@domain.com" required></td>
                </tr>
                <tr>
                    <td><label for="tgl_lahir">Tanggal Lahir</label></td>
                    <td><input type="date" id="tgl_lahir" name="tgl_lahir" min="1987-01-01" max="1993-01-01" required></td>
                </tr>
            </table>
        </fieldset>

        <fieldset style="margin-bottom: 20px;">
            <legend>Permintaan Pertemuan</legend>
            <table style="width: 100%;">
                <tr>
                    <td style="width: 30%;"><label for="tujuan">Tujuan Pertemuan</label></td>
                    <td><input type="text" id="tujuan" name="tujuan" required></td>
                </tr>
                <tr>
                    <td><label for="kepentingan">Tingkat Kepentingan Pertemuan</label></td>
                    <td><input type="range" id="kepentingan" name="kepentingan" min="0" max="10"></td>
                </tr>
                <tr>
                    <td><label for="tgl_temu">Tanggal</label></td>
                    <td><input type="date" id="tgl_temu" name="tgl_temu" min="2026-04-02" required></td>
                </tr>
                <tr>
                    <td><label for="waktu">Waktu</label></td>
                    <td><input type="time" id="waktu" name="waktu" min="17:00" max="21:00" required></td>
                </tr>
            </table>
        </fieldset>
        
        <input type="submit" value="Submit">
    </form>
</article>
